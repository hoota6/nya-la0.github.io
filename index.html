<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبكة البحير الاجتماعية - النسخة المتكاملة</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    <style>
        :root { --primary: #0055d4; --bg: #f0f2f5; --white: #fff; --online: #42b72a; --fb-blue: #1877F2; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        /* شاشة الدخول */
        #auth-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .auth-card { background: var(--white); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 420px; }
        .auth-card input, .auth-card select { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; }

        /* التطبيق الرئيسي */
        #main-app { display: none; }
        header { background: var(--primary); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        #notification-popup { position: fixed; top: 75px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 25px; font-size: 0.85rem; z-index: 2000; display: none; }

        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }
        .user-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; border: 1px solid #e0e0e0; }
        .profile-pic { width: 60px; height: 60px; border-radius: 50%; background: #eee; position: relative; border: 2px solid var(--primary); }
        .status-dot { position: absolute; bottom: 3px; right: 3px; width: 14px; height: 14px; background: var(--online); border: 2px solid white; border-radius: 50%; }

        /* نظام الدردشة */
        #chat-box { position: fixed; bottom: 0; left: 20px; width: 320px; background: white; border-radius: 12px 12px 0 0; box-shadow: 0 -5px 25px rgba(0,0,0,0.2); display: none; flex-direction: column; z-index: 3000; }
        .chat-header { background: var(--primary); color: white; padding: 12px; border-radius: 12px 12px 0 0; display: flex; justify-content: space-between; }
        .chat-messages { height: 300px; overflow-y: auto; padding: 15px; background: #f9f9f9; display: flex; flex-direction: column; gap: 12px; }
        .msg-item { position: relative; }
        .msg-content { background: #e7f3ff; padding: 8px 12px; border-radius: 12px; display: inline-block; max-width: 85%; position: relative; }
        .msg-time { font-size: 0.65rem; color: #888; display: block; margin-top: 4px; text-align: left; }
        .msg-actions { font-size: 0.7rem; color: var(--primary); cursor: pointer; margin-top: 4px; display: block; }
        
        .chat-input-area { padding: 12px; border-top: 1px solid #eee; display: flex; align-items: center; gap: 8px; }
        .chat-input-area input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        audio { height: 35px; width: 100%; margin-top: 5px; }

        @media (max-width: 480px) { #chat-box { left: 0; width: 100%; } }
    </style>
</head>
<body>

<div id="notification-popup"></div>

<div id="auth-screen">
    <div class="auth-card">
        <h2>البحير نت</h2>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة السر">
        <input type="text" id="full-name" placeholder="الاسم الكامل">
        <div style="display: flex; gap: 8px;">
            <input type="number" id="age" placeholder="العمر" style="flex: 1;">
            <select id="gender" style="flex: 1;">
                <option value="" disabled selected>الجنس</option>
                <option value="ذكر">ذكر</option>
                <option value="أنثى">أنثى</option>
            </select>
        </div>
        <select id="marital-status">
            <option value="" disabled selected>الحالة الاجتماعية</option>
            <option value="أعزب">أعزب</option><option value="متزوج">متزوج</option>
            <option value="مطلق">مطلق</option><option value="أرمل">أرمل</option>
        </select>
        <select id="state">
            <option value="" disabled selected>اختر الولاية السودانية</option>
            <option value="الخرطوم">الخرطوم</option><option value="الجزيرة">الجزيرة</option>
            <option value="نهر النيل">نهر النيل</option><option value="الشمالية">الشمالية</option>
            <option value="البحر الأحمر">البحر الأحمر</option><option value="القضارف">القضارف</option>
            <option value="كسلا">كسلا</option><option value="سنار">سنار</option>
            <option value="النيل الأبيض">النيل الأبيض</option><option value="النيل الأزرق">النيل الأزرق</option>
            <option value="شمال كردفان">شمال كردفان</option><option value="جنوب كردفان">جنوب كردفان</option>
            <option value="غرب كردفان">غرب كردفان</option><option value="شمال دارفور">شمال دارفور</option>
            <option value="جنوب دارفور">جنوب دارفور</option><option value="غرب دارفور">غرب دارفور</option>
            <option value="شرق دارفور">شرق دارفور</option><option value="وسط دارفور">وسط دارفور</option>
        </select>
        <input type="tel" id="phone">
        <button onclick="startApp()" style="width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">إنشاء حساب</button>
        <p style="color:var(--primary); cursor:pointer; font-size:0.8rem; margin-top:10px;">لدي حساب بالفعل؟ تسجيل دخول</p>
    </div>
</div>

<div id="main-app">
    <header>
        <div><strong>شبكة البحير</strong></div>
        <div style="font-size: 0.8rem;">متصل 🟢</div>
    </header>
    <div class="container">
        <h3 style="color:#1c1e21">استكشف المستخدمين 🌍</h3>
        <div id="users-feed"></div>
    </div>
</div>

<div id="chat-box">
    <div class="chat-header"><span id="chat-user">دردشة</span><span onclick="closeChat()" style="cursor:pointer">✖</span></div>
    <div class="chat-messages" id="chat-msgs"></div>
    <div class="chat-input-area">
        <label style="cursor:pointer">📷<input type="file" style="display:none" onchange="sendMedia('صورة')"></label>
        <span onclick="sendMedia('صوت')" style="cursor:pointer">🎤</span>
        <input type="text" id="msg-input" placeholder="اكتب رسالة...">
        <span onclick="sendMsg()" style="color:var(--primary); font-weight:bold; cursor:pointer">إرسال</span>
    </div>
</div>

<script>
    // Firebase
    const firebaseConfig = { apiKey: "AIzaSyAHbXMLT3F0OpnMZQHHPz-kAOlZBi1hhs4", authDomain: "albehirsocial.firebaseapp.com", databaseURL: "https://albehirsocial-default-rtdb.firebaseio.com", projectId: "albehirsocial" };
    firebase.initializeApp(firebaseConfig);

    const iti = window.intlTelInput(document.querySelector("#phone"), { preferredCountries: ["sd"] });

    function startApp() {
        const name = document.getElementById('full-name').value;
        if(!name) return alert("الرجاء إدخال الاسم");
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        
        renderUser(name);
        showNotify(name);
    }

    function renderUser(name) {
        const state = document.getElementById('state').value;
        const html = `
            <div class="user-card">
                <div class="profile-pic"><div class="status-dot"></div></div>
                <div style="flex:1">
                    <div class="user-name">${name}</div>
                    <div style="font-size:0.8rem; color:#666">${state} • نشط الآن</div>
                    <div style="margin-top:10px; display:flex; gap:5px;">
                        <button onclick="like(this)" style="flex:1; padding:8px; border:none; border-radius:5px; cursor:pointer">👍 أحببته <span class="count">0</span></button>
                        <button onclick="openChat('${name}')" style="flex:1; padding:8px; background:var(--primary); color:white; border:none; border-radius:5px; cursor:pointer">مراسلة</button>
                    </div>
                </div>
            </div>`;
        document.getElementById('users-feed').insertAdjacentHTML('afterbegin', html);
    }

    function showNotify(name) {
        const p = document.getElementById('notification-popup');
        p.innerText = `🟢 ${name} متصل الآن`;
        p.style.display = 'block';
        setTimeout(() => p.style.display = 'none', 4000);
    }

    function openChat(name) {
        document.getElementById('chat-box').style.display = 'flex';
        document.getElementById('chat-user').innerText = name;
    }

    function closeChat() { document.getElementById('chat-box').style.display = 'none'; }

    function sendMsg() {
        const inp = document.getElementById('msg-input');
        if(inp.value) { appendMessage('أنت', inp.value, 'text'); inp.value = ''; }
    }

    function sendMedia(type) {
        if(type === 'صوت') appendMessage('أنت', '', 'voice');
        else appendMessage('أنت', '📷 أرسل صورة', 'text');
    }

    function appendMessage(sender, text, type) {
        const id = 'm' + Date.now();
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        let content = type === 'voice' ? `🎤 صوتية <audio controls><source src="#"></audio>` : text;
        
        const html = `
            <div class="msg-item" id="${id}">
                <div class="msg-content">
                    <span class="body">${content}</span>
                    <span class="msg-time">${time}</span>
                </div>
                <div class="msg-actions">
                    <span onclick="editMsg('${id}')">تعديل</span> | <span onclick="document.getElementById('${id}').remove()">حذف</span>
                </div>
            </div>`;
        const container = document.getElementById('chat-msgs');
        container.innerHTML += html;
        container.scrollTop = container.scrollHeight;
    }

    function editMsg(id) {
        const b = document.querySelector(`#${id} .body`);
        if(b.innerText.includes('🎤')) return;
        const n = prompt("تعديل الرسالة:", b.innerText);
        if(n) b.innerText = n + " (معدلة)";
    }

    function like(btn) {
        const c = btn.querySelector('.count');
        c.innerText = c.innerText === "0" ? "1" : "0";
        btn.style.color = c.innerText === "1" ? "var(--fb-blue)" : "";
    }
</script>
</body>
</html>
