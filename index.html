<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2092/2092663.png" type="image/x-icon">
    
    <meta property="og:description" content="معالجة المشاكل التي تخص مواقع التواصل الاجتماعي وإنشاء المواقع الإلكترونية">
    <title>❤️البحير نت للتقنية❤️</title>
    <style>
        :root {
            --primary-blue: #326abe;
            --accent-yellow: #ffcc33;
            --bg-light: #f4f7f6;
            --chat-bg: #e1f5fe;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1518770660439-4636190af475?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .contact-container {
            background: rgba(255, 255, 255, 0.98);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 550px;
            text-align: center;
            position: relative; /* لإحتواء العنصر المتحرك */
        }

        .site-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--primary-blue);
            padding: 10px;
            margin-bottom: 10px;
        }

        h2 {
            color: var(--primary-blue);
            margin-top: 10px;
            font-size: 26px;
        }

        .responsive-img {
            width: 100%;
            height: auto;
            max-height: 250px;
            object-fit: cover;
            border-radius: 10px;
            margin: 15px 0;
            display: block; /* لضمان الظهور الصحيح */
        }

        .services-text {
            text-align: justify;
            font-size: 14px;
            line-height: 1.6;
            background: #f9f9f9;
            padding: 15px;
            border-right: 4px solid var(--primary-blue);
            margin: 15px 0;
        }

        /* تنسيق العنصر المتحرك "أنا هنا لمساعدتك" */
        .helper-box {
            background-color: var(--chat-bg);
            border-radius: 15px;
            padding: 15px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--primary-blue);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            animation: pulse 2s infinite; /* حركة نبض */
        }

        .computer-face {
            font-size: 40px;
            margin-left: 15px;
            animation: blink 1.5s infinite; /* حركة رمش */
        }

        .helper-text {
            text-align: right;
            color: #333;
        }

        .welcome-msg {
            font-weight: bold;
            color: var(--primary-blue);
            font-size: 16px;
        }

        .help-msg {
            font-size: 14px;
        }

        /* تعريف الحركات (Animations) */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
            50% { transform: scale(1.02); box-shadow: 0 6px 12px rgba(50, 106, 190, 0.3); }
            100% { transform: scale(1); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .form-group {
            margin-bottom: 15px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #444;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            font-family: inherit;
        }

        button {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        button:hover {
            background-color: #255191;
            box-shadow: 0 5px 15px rgba(50, 106, 190, 0.4);
        }

        @media (max-width: 480px) {
            .contact-container { padding: 20px; }
            h2 { font-size: 20px; }
            body { padding: 10px; }
            .computer-face { font-size: 30px; }
            .welcome-msg { font-size: 14px; }
            .help-msg { font-size: 12px; }
        }
    </style>
</head>
<body>

    <div class="contact-container">
        <img src="https://cdn-icons-png.flaticon.com/512/2092/2092663.png" alt="Logo" class="site-logo">
        
        <h2>❤️البحير نت للتقنية❤️</h2>

        <div class="helper-box">
            <div class="computer-face">💻😊</div>
            <div class="helper-text">
                <div class="welcome-msg">مرحبا بك</div>
                <div class="help-msg">أنا هنا لمساعدتك لحل مشكلتك</div>
            </div>
        </div>

        <img src="https://images.unsplash.com/photo-1563206074-96219193d601?w=800&auto=format&fit=crop" class="responsive-img" alt="عالم أمن المعلومات">

        <div class="services-text">
            <strong>خدماتنا المطورة:</strong><br>
            فتح وتأمين حسابات التواصل الاجتماعي، إنشاء الحسابات البنكية الرقمية (بنكك، فوري)، وحلول تقنية متكاملة لأمن المعلومات وتصميم المواقع.
        </div>

        <h4>أنت في مكانك الصحيح لحل مشكلتك</h4>

        <form action="https://formsubmit.co/alshftmhmwd9@gmail.com" method="post">
            
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="_subject" value="طلب خدمة جديد - البحير نت"> 

            <div class="form-group">
                <input type="text" name="الاسم الكامل" placeholder="ادخل الاسم الكامل" required>
            </div>

            <div class="form-group">
                <label>نوع الخدمة المطلوبة:</label>
                <select name="الخدمة" required>
                    <option value="" disabled selected>حدد الخدمة التي تحتاجها</option>
                    <optgroup label="مواقع التواصل الاجتماعي">
                        <option value="فتح حساب فيسبوك">فتح وتأمين حساب فيسبوك</option>
                        <option value="فتح حساب واتساب">فتح حساب واتساب</option>
                        <option value="فتح حساب تيلجرام">فتح حساب تيلجرام</option>
                    </optgroup>
                    <optgroup label="خدمات بنكية ورقمية">
                        <option value="فتح حساب بنكك">فتح حساب بنكك (Bankak)</option>
                        <option value="فتح حساب فوري">فتح حساب فوري (Fawry)</option>
                        <option value="فتح حساب اوكاش">فتح حساب اوكاش (Cash)</option>
                        <option value="فتح حساب بنك المشرق">فتح حساب بنك المشرق</option>
                    </optgroup>
                    <optgroup label="خدمات أخرى">
                        <option value="تصميم موقع الكتروني">تصميم موقع إلكتروني</option>
                        <option value="تأكيد الهوية">تأكيد حساب فيسبوك بالبطاقة/الجواز</option>
                    </optgroup>
                </select>
            </div>

            <div class="form-group">
                <textarea name="الرسالة" rows="4" placeholder="اكتب تفاصيل طلبك ورقم هاتفك للتواصل..." required></textarea>
            </div>

            <div class="form-group">
                <label>كيف علمت بموقعنا؟</label>
                <select name="مصدر_المعرفة" required>
                    <option value="صديق">عن طريق صديق</option>
                    <option value="جوجل">عن طريق جوجل</option>
                    <option value="فيسبوك">عن طريق فيسبوك</option>
                    <option value="محمود عصام">المبرمج محمود عصام</option>
                </select>
            </div>

            <div class="form-group">
                <label>ما تقييمك لخدمات الموقع</label>
                <select name="التقييم" required>
                    <option value="5">***** (ممتاز)</option>
                    <option value="4">**** (جيد جداً)</option>
                    <option value="3">*** (جيد)</option>
                    <option value="2">** (متوسط)</option>
                    <option value="1">* (ضعيف)</option>
                </select>
            </div>

            <button type="submit">إرسال الطلب الآن</button>
        </form>
    </div>

</body>
</html>
