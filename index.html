<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبكة البحير | Albeher Net</title>
    <style>
        :root { --main: #ff2d55; --dark: #4e085f; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        /* شاشات الدخول والتسجيل */
        #auth-screen { position: fixed; inset: 0; background: linear-gradient(135deg, var(--main), var(--dark)); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .auth-box { background: white; padding: 20px; border-radius: 20px; width: 340px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); max-height: 95vh; overflow-y: auto; }
        
        #preview-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--main); margin-bottom: 10px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-reg { background: var(--main); color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn-have-acc { background: var(--dark); color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }

        /* هيكل الصفحات الأصلي */
        #main-app { display: none; padding-bottom: 70px; }
        .header { background: var(--main); color: white; padding: 15px; text-align: center; position: fixed; top: 0; width: 100%; z-index: 100; font-weight: bold; }
        .page { display: none; padding: 70px 15px 20px 15px; max-width: 600px; margin: 0 auto; }
        .active-page { display: block; }
        
        .navbar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #ddd; z-index: 100; }
        .nav-item { cursor: pointer; color: #888; font-size: 0.85rem; text-align: center; }
        .nav-item.active { color: var(--main); font-weight: bold; }

        .user-card { background: white; padding: 15px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 15px; }
        .user-card img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box" id="reg-box">
            <h2 style="color:var(--main);">تسجيل جديد</h2>
            <img id="preview-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            <input type="file" id="file-input" accept="image/*" style="display:none" onchange="preview(this)">
            <button onclick="document.getElementById('file-input').click()" style="margin-bottom:10px; cursor:pointer;">اختر صورة الملف</button>
            
            <input type="text" id="r-name" placeholder="اسم المستخدم">
            <input type="password" id="r-pass" placeholder="كلمة السر">
            <input type="number" id="r-age" placeholder="العمر">
            <select id="r-state">
                <option value="الخرطوم">الخرطوم</option>
                <option value="الجزيرة">الجزيرة</option>
                <option value="البحر الأحمر">البحر الأحمر</option>
            </select>
            <input type="text" id="r-hobby" placeholder="الهواية">
            
            <button class="btn-reg" onclick="register()">إنشاء حساب ودخول</button>
            <button class="btn-have-acc" onclick="toggleView(true)">لدي حساب بالفعل</button>
        </div>

        <div class="auth-box" id="log-box" style="display:none;">
            <h2 style="color:var(--dark);">تسجيل الدخول</h2>
            <input type="text" id="l-name" placeholder="اسم المستخدم">
            <input type="password" id="l-pass" placeholder="كلمة السر">
            <button class="btn-reg" style="background:var(--dark)" onclick="login()">دخول للموقع</button>
            <button onclick="toggleView(false)" style="background:none; border:none; color:var(--main); margin-top:10px; cursor:pointer;">إنشاء حساب جديد</button>
        </div>
    </div>

    <div id="main-app">
        <div class="header" id="page-title">استكشف أصدقاء</div>
        
        <div id="page-explore" class="page active-page">
            <div id="users-list">
                </div>
        </div>

        <div id="page-chats" class="page">
            <center><p style="margin-top:50px; color:#666;">لا توجد محادثات حالياً</p></center>
        </div>

        <div id="page-notifs" class="page">
            <div class="user-card">🔔 تنبيه: أهلاً بك في شبكة البحير!</div>
        </div>

        <div class="navbar">
            <div class="nav-item active" onclick="nav('explore', 'استكشف أصدقاء', this)">❤️ استكشف</div>
            <div class="nav-item" onclick="nav('chats', 'الرسائل', this)">💬 الرسائل</div>
            <div class="nav-item" onclick="nav('notifs', 'الإشعارات', this)">🔔 الإشعارات</div>
            <div class="nav-item" onclick="location.reload()" style="color:red">🚪 خروج</div>
        </div>
    </div>

    <script>
        let profileImg = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

        function preview(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    profileImg = e.target.result;
                    document.getElementById('preview-img').src = profileImg;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function toggleView(isLogin) {
            document.getElementById('reg-box').style.display = isLogin ? 'none' : 'block';
            document.getElementById('log-box').style.display = isLogin ? 'block' : 'none';
        }

        // تسجيل وحفظ كافة البيانات
        function register() {
            const data = {
                name: document.getElementById('r-name').value,
                pass: document.getElementById('r-pass').value,
                age: document.getElementById('r-age').value,
                state: document.getElementById('r-state').value,
                hobby: document.getElementById('r-hobby').value,
                photo: profileImg
            };

            if(!data.name || !data.pass) return alert("اكمل البيانات الأساسية");
            
            localStorage.setItem('user_' + data.name, JSON.stringify(data));
            alert("تم التسجيل بنجاح!");
            enterApp(data);
        }

        // دخول واسترجاع كافة البيانات
        function login() {
            const name = document.getElementById('l-name').value;
            const pass = document.getElementById('l-pass').value;
            const savedData = localStorage.getItem('user_' + name);

            if(savedData) {
                const user = JSON.parse(savedData);
                if(user.pass === pass) {
                    enterApp(user);
                } else { alert("كلمة السر خطأ"); }
            } else { alert("المستخدم غير موجود"); }
        }

        function enterApp(user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            
            // استرجاع البيانات وعرضها في صفحة استكشف كمثال
            document.getElementById('users-list').innerHTML = `
                <div class="user-card">
                    <img src="${user.photo}">
                    <div>
                        <b>${user.name} (${user.age} سنة)</b><br>
                        <small>📍 ${user.state} | 🎨 ${user.hobby}</small>
                    </div>
                </div>
            `;
        }

        function nav(id, title, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById('page-' + id).classList.add('active-page');
            document.getElementById('page-title').innerText = title;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
