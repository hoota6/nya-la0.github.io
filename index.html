<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:description" content="معالجة المشاكل التي تخص مواقع التواصل الاجتماعي وإنشاء المواقع الإلكترونية">
    <title>البحير نت</title>
    <style>
        :root {
            --primary-blue: #326abe;
            --accent-yellow: #ffcc33;
            --bg-light: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* استبدال خلفية الملف المفقود بخلفية تقنية من الإنترنت */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1518770660439-4636190af475?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .contact-container {
            background: rgba(255, 255, 255, 0.98);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 550px;
            text-align: center;
        }

        /* تنسيق اللوجو الجديد */
        .site-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--primary-blue);
            padding: 10px;
            margin-bottom: 10px;
        }

        h2 {
            color: var(--primary-blue);
            margin-top: 10px;
            font-size: 26px;
        }

        /* تنسيق الصور لتكون متجاوبة 100% */
        .responsive-img {
            width: 100%;
            height: auto;
            max-height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin: 15px 0;
        }

        .services-text {
            text-align: justify;
            font-size: 14px;
            line-height: 1.6;
            background: #f9f9f9;
            padding: 15px;
            border-right: 4px solid var(--primary-blue);
            margin: 15px 0;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #444;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            font-family: inherit;
        }

        button {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        button:hover {
            background-color: #255191;
            box-shadow: 0 5px 15px rgba(50, 106, 190, 0.4);
        }

        /* تحسينات الموبايل */
        @media (max-width: 480px) {
            .contact-container { padding: 20px; }
            h2 { font-size: 20px; }
            body { padding: 10px; }
        }
    </style>
</head>
<body>

    <div class="contact-container">
        <img src="https://cdn-icons-png.flaticon.com/512/2092/2092663.png" alt="Logo" class="site-logo">
        
        <h2>❤️مرحبا بك عزيزنا الزائر❤️</h2>

        <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=500&auto=format" class="responsive-img" alt="برمجة">

        <div class="services-text">
            <strong>خدماتنا:</strong><br>
            تصميم المواقع الإلكترونية، فتح وتأمين حسابات التواصل الاجتماعي (فيسبوك، تويتر، إنستغرام)، تأكيد الحسابات بالهوية الرسمية، واستشارات تقنية متخصصة في أمن المعلومات.
        </div>

        <img src="https://images.unsplash.com/photo-1553877522-43269d4ea984?w=500&auto=format" class="responsive-img" alt="دعم فني">

        <h4>أنت في مكانك الصحيح لحل مشكلتك</h4>

        <form action="https://formsubmit.co/alshftmhmwd9@gmail.com" method="post">
            
            <div class="form-group">
                
                
            </div>

            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="_subject" value="رسالة جديدة!"> 

            <div class="form-group">
                <input type="text" name="الاسم الكامل" placeholder="ادخل الاسم الكامل" required>
            </div>

            <div class="form-group">
                <select name="المشكلة" required>
                    <option value="" disabled selected>حدد نوع المشكلة التي تواجهها</option>
                    <option value="فتح حساب فايسبوك جديد">فتح حساب فيسبوك جديد</option>
                    <option value="تصميم موقع الكتروني">تصميم موقع الكتروني</option>
                    <option value="تأمين حساب فايسبوك">تأمين حساب فيسبوك</option>
                    <option value="إنشاء حسابات أخرى">إنشاء حسابات تواصل أخرى (إنستغرام، واتساب..)</option>
                    <option value="تأكيد الهوية">تأكيد الحساب بالبطاقة القومية</option>
                    <option value="شراكة برمجية">طلب شراكة في مجال البرمجة</option>
                </select>
            </div>

            <div class="form-group">
                <textarea name="الرسالة" rows="4" placeholder="اكتب رسالتك وتضمن رقم واتساب الخاص بك..." required></textarea>
            </div>

            <div class="form-group">
                <label>كيف علمت بموقعنا؟</label>
                <select name="مصدر_المعرفة" required>
                    <option value="" disabled selected>اختر خياراً...</option>
                    <option value="صديق">عن طريق صديق</option>
                    <option value="جوجل">عن طريق جوجل</option>
                    <option value="فيسبوك">عن طريق فيسبوك</option>
                    <option value="محمود عصام">المبرمج محمود عصام</option>
                </select>
            </div>

            <div class="form-group">
                <img src="https://images.unsplash.com/photo-1521791136364-798a7bc0d262?w=500&auto=format" class="responsive-img" alt="تقييم">
                <label>ما تقييمك لخدماتنا؟</label>
                <select name="التقييم" required>
                    <option value="5">***** (ممتاز)</option>
                    <option value="4">**** (جيد جداً)</option>
                    <option value="3">*** (جيد)</option>
                    <option value="2">** (متوسط)</option>
                    <option value="1">* (ضعيف)</option>
                </select>
            </div>

            <button type="submit">إرسال البيانات الآن</button>
        </form>
    </div>

</body>
</html>
