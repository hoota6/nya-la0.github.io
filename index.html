<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق مودة للتعارف</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-container" class="container">
        <h2 id="form-title">إنشاء حساب جديد</h2>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة السر">
        <button onclick="handleAuth()" id="auth-btn">تسجيل</button>
        <p onclick="toggleAuth()" id="toggle-text">لديك حساب بالفعل؟ سجل دخولك</p>
    </div>

    <div id="app-container" class="container" style="display:none;">
        <header>
            <span>مرحباً، <b id="user-display"></b></span>
            <button onclick="logout()">خروج</button>
        </header>
        
        <div class="chat-box">
            <div id="users-list">
                <h4>الأعضاء المتصلون</h4>
                </div>
            <div id="chat-window">
                <div id="messages"></div>
                <div class="input-area">
                    <input type="text" id="msg-input" placeholder="اكتب رسالتك هنا...">
                    <button onclick="sendMessage()">إرسال</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
