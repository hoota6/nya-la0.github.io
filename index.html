<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبكة البحير - نظام المراسلة المتطور</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    <style>
        :root { --primary: #0055d4; --bg: #f0f2f5; --white: #fff; --online: #42b72a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        #main-app { display: none; }
        header { background: var(--primary); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        
        /* الإشعارات */
        #notification-bar { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.8rem; z-index: 2000; display: none; animation: fadeIn 0.5s; }
        
        .container { max-width: 600px; margin: 20px auto; padding: 10px; }
        .user-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; border: 1px solid #e0e0e0; }
        .profile-pic { width: 55px; height: 55px; border-radius: 50%; background: #eee; position: relative; }
        .status-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: var(--online); border: 2px solid white; border-radius: 50%; }

        /* نافذة الدردشة المتطورة */
        #chat-window { position: fixed; bottom: 0; left: 20px; width: 320px; background: white; border-radius: 12px 12px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); display: none; z-index: 3000; flex-direction: column; }
        .chat-header { background: var(--primary); color: white; padding: 12px; border-radius: 12px 12px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .chat-body { height: 250px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; background: #f9f9f9; }
        .chat-footer { padding: 10px; border-top: 1px solid #eee; display: flex; align-items: center; gap: 8px; }
        .chat-footer input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 8px 12px; outline: none; }
        .media-btn { cursor: pointer; font-size: 1.2rem; color: #65676b; transition: 0.2s; }
        .media-btn:hover { color: var(--primary); }

        @keyframes fadeIn { from { opacity: 0; top: 50px; } to { opacity: 1; top: 70px; } }
    </style>
</head>
<body>

<div id="notification-bar"></div>

<div id="auth-screen">
    <div class="auth-card" style="max-width:400px; margin: 100px auto; padding: 20px; background: white; border-radius: 15px; text-align: center;">
        <h2 style="color:var(--primary)">البحير نت</h2>
        <input type="text" id="full-name" placeholder="الاسم الكامل" style="width:90%; padding:10px; margin-bottom:10px;">
        <select id="state-input" style="width:90%; padding:10px; margin-bottom:10px;">
            <option value="الخرطوم">الخرطوم</option>
            <option value="نهر النيل">نهر النيل</option>
            <option value="الجزيرة">الجزيرة</option>
            </select>
        <button onclick="loginDemo()" style="width:90%; padding:10px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer;">دخول للموقع</button>
    </div>
</div>

<div id="main-app">
    <header>
        <div><strong>شبكة البحير الاجتماعية</strong></div>
        <div id="status">متصل 🟢</div>
    </header>
    <div class="container">
        <h3>استكشف المستخدمين 🌍</h3>
        <div id="explore-container">
            </div>
    </div>
</div>

<div id="chat-window">
    <div class="chat-header">
        <span id="chat-user-name">الدردشة</span>
        <span onclick="closeChat()" style="cursor:pointer">✖</span>
    </div>
    <div class="chat-body" id="chat-msgs">
        <div style="font-size: 0.7rem; text-align: center; color: #999;">تنبيه: يمكنك إرسال نصوص، صور، أو تسجيل صوتي</div>
    </div>
    <div class="chat-footer">
        <label class="media-btn" title="إرسال صورة">📷<input type="file" id="img-input" style="display:none" accept="image/*" onchange="sendImage()"></label>
        <span class="media-btn" onclick="startVoice()" title="رسالة صوتية">🎤</span>
        <input type="text" id="msg-input" placeholder="اكتب رسالة...">
        <span onclick="sendText()" style="color:var(--primary); font-weight:bold; cursor:pointer">إرسال</span>
    </div>
</div>

<script>
    // خاصية الإشعارات "فلان متصل الآن"
    function showNotification(name) {
        const bar = document.getElementById('notification-bar');
        bar.innerText = `🟢 ${name} متصل الآن`;
        bar.style.display = 'block';
        setTimeout(() => { bar.style.display = 'none'; }, 4000);
    }

    function loginDemo() {
        const name = document.getElementById('full-name').value;
        if(!name) return alert("ادخل اسمك");
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        
        // محاكاة إشعار بعد دخولك
        setTimeout(() => showNotification("محمود عصام"), 2000);
        addUser(name);
    }

    function addUser(name) {
        const state = document.getElementById('state-input').value;
        const html = `
            <div class="user-card">
                <div class="profile-pic"><div class="status-dot"></div></div>
                <div style="flex-grow:1">
                    <div style="font-weight:bold">${name}</div>
                    <div style="font-size:0.8rem; color:#666">${state} • نشط الآن</div>
                </div>
                <button onclick="openChat('${name}')" style="padding:8px 15px; background:var(--primary); color:white; border:none; border-radius:5px; cursor:pointer">مراسلة</button>
            </div>`;
        document.getElementById('explore-container').innerHTML += html;
    }

    // نظام المراسلة المتعدد
    function openChat(name) {
        document.getElementById('chat-window').style.display = 'flex';
        document.getElementById('chat-user-name').innerText = name;
    }

    function closeChat() { document.getElementById('chat-window').style.display = 'none'; }

    function sendText() {
        const inp = document.getElementById('msg-input');
        if(inp.value) {
            appendMsg("أنت", inp.value, 'text');
            inp.value = "";
        }
    }

    function sendImage() {
        appendMsg("أنت", "🖼 أرسل صورة (جاهز للرفع للقاعدة)", 'media');
    }

    function startVoice() {
        alert("بدأ تسجيل الرسالة الصوتية... (جاهز للربط بـ Storage)");
        appendMsg("أنت", "🎤 رسالة صوتية 0:05", 'media');
    }

    function appendMsg(sender, content, type) {
        const chatBody = document.getElementById('chat-msgs');
        const div = document.createElement('div');
        div.style.marginBottom = "10px";
        div.innerHTML = `<b style="font-size:0.8rem">${sender}:</b> <div style="background:${type==='text'?'#e7f3ff':'#eee'}; padding:8px; border-radius:10px; font-size:0.9rem;">${content}</div>`;
        chatBody.appendChild(div);
        chatBody.scrollTop = chatBody.scrollHeight;
    }
</script>
</body>
</html>
