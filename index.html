<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SudanBook Pro - نظام تواصل اجتماعي متكامل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #00a859;
            --primary-soft: #e6f6ef;
            --bg-color: #f2f4f7;
            --card-bg: #ffffff;
            --text-main: #1a1a1b;
            --text-muted: #65676b;
            --border-color: #dee2e6;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        body.dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e4e6eb;
            --text-muted: #b0b3b8;
            --border-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 80px;
            transition: all 0.3s ease;
        }

        /* Header System */
        header {
            background: var(--card-bg);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow);
            border-bottom: 1px solid var(--border-color);
        }

        .logo { font-size: 22px; font-weight: 800; color: var(--primary-color); letter-spacing: -1px; }

        /* Navigation Bar */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--card-bg);
            display: flex;
            height: 65px;
            border-top: 1px solid var(--border-color);
            z-index: 1000;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item span { font-size: 10px; font-weight: 600; }
        .nav-item.active { color: var(--primary-color); }
        .nav-item.active::after {
            content: '';
            position: absolute;
            top: 0;
            width: 30%;
            height: 3px;
            background: var(--primary-color);
            border-radius: 0 0 5px 5px;
        }

        /* Main Container */
        .app-container { max-width: 600px; margin: 20px auto; padding: 0 15px; }

        /* Post Card Engine */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .post-header { display: flex; align-items: center; margin-bottom: 12px; }
        .avatar-sm { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; margin-left: 12px; background: #ddd; }
        .user-info b { display: block; font-size: 15px; }
        .user-info small { color: var(--text-muted); font-size: 12px; }

        .post-content { font-size: 15px; line-height: 1.6; margin-bottom: 15px; }
        
        /* Reaction System */
        .post-stats {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 10px;
        }

        .stat-item { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }

        .post-actions { display: flex; justify-content: space-around; }
        .action-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-muted);
            transition: 0.2s;
            position: relative;
        }

        .action-btn:hover { background: var(--primary-soft); color: var(--primary-color); }

        /* Facebook-Style Reactions Flyout */
        .reactions-box {
            position: absolute;
            bottom: 45px;
            background: var(--card-bg);
            padding: 8px 15px;
            border-radius: 30px;
            display: none;
            gap: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            z-index: 100;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .reactions-box span { font-size: 26px; transition: 0.2s; }
        .reactions-box span:hover { transform: scale(1.4); }

        /* Profile Pro */
        .profile-header { position: relative; border-radius: 20px; overflow: hidden; margin-bottom: 60px; }
        .cover-photo { width: 100%; height: 200px; background: #ddd; object-fit: cover; }
        .profile-main-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid var(--card-bg);
            position: absolute;
            bottom: -50px;
            right: 20px;
            object-fit: cover;
            background: var(--primary-color);
        }

        .page { display: none; }
        .page.active { display: block; }

        /* Professional Inputs */
        .input-group { position: relative; margin-bottom: 15px; }
        .main-input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-main);
            font-size: 15px;
            outline: none;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
        }

    </style>
</head>
<body>

<header>
    <div class="logo">SudanBook <span style="color: #333; font-size: 12px;">PRO</span></div>
    <div onclick="toggleDarkMode()" style="cursor: pointer; font-size: 20px;">
        <i class="fas fa-moon"></i>
    </div>
</header>

<div class="app-container">
    
    <div id="home" class="page active">
        <div class="card">
            <div class="post-header">
                <img src="https://via.placeholder.com/500" class="avatar-sm" id="user-avatar-post">
                <div class="user-info"><b id="user-name-display">مستخدم سودانبوك</b></div>
            </div>
            <textarea class="main-input" id="post-text" placeholder="ماذا يدور في ذهنك اليوم؟" rows="3" style="resize: none;"></textarea>
            <button class="btn-primary" style="margin-top: 10px;" onclick="handlePublish()">نشر الآن</button>
        </div>
        <div id="feed-render"></div>
    </div>

    <div id="profile" class="page">
        <div class="profile-header">
            <img id="my-cover" src="https://images.unsplash.com/photo-1557683316-973673baf926" class="cover-photo">
            <img id="my-avatar" src="https://via.placeholder.com/150" class="profile-main-pic">
        </div>
        <div style="margin-top: 60px; text-align: right; padding: 0 10px;">
            <h2 id="prof-name" style="margin: 0;">اسم المستخدم</h2>
            <p id="prof-bio" style="color: var(--text-muted);">مطور برمجيات | سوداني 🇸🇩</p>
            <div style="display: flex; gap: 10px; margin: 15px 0;">
                <button class="btn-primary" style="flex: 1;" onclick="document.getElementById('avatar-file').click()">تعديل الملف</button>
                <input type="file" id="avatar-file" hidden onchange="uploadImage(this, 'avatar')">
            </div>
        </div>
        <div id="my-posts-render"></div>
    </div>

    <div id="messages" class="page">
        <div class="card"><h3>المحادثات</h3><p>لا توجد رسائل جديدة.</p></div>
    </div>

</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="navigate('home', this)"><i class="fas fa-home"></i><span>الموجز</span></div>
    <div class="nav-item" onclick="navigate('messages', this)"><i class="fas fa-comment-dots"></i><span>الرسائل</span></div>
    <div class="nav-item" onclick="navigate('notifications', this)"><i class="fas fa-bell"></i><span>التنبيهات</span></div>
    <div class="nav-item" onclick="navigate('profile', this)"><i class="fas fa-user-circle"></i><span>الملف</span></div>
</nav>

<audio id="like-sound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>
    // --- بنية البيانات للربط مع قاعدة البيانات مستقبلاً ---
    let appState = {
        user: JSON.parse(localStorage.getItem('user')) || {
            id: 1,
            name: "أحمد علي",
            avatar: "https://i.pravatar.cc/150?u=1",
            cover: "https://images.unsplash.com/photo-1506744038136-46273834b3fb",
            bio: "أهلاً بك في عالمي!"
        },
        posts: JSON.parse(localStorage.getItem('posts')) || []
    };

    // --- المحرك الأساسي (Core Engine) ---
    function init() {
        document.getElementById('user-name-display').innerText = appState.user.name;
        document.getElementById('prof-name').innerText = appState.user.name;
        document.getElementById('prof-bio').innerText = appState.user.bio;
        document.getElementById('my-avatar').src = appState.user.avatar;
        document.getElementById('user-avatar-post').src = appState.user.avatar;
        renderFeed();
    }

    // --- نظام النشر (Publishing System) ---
    function handlePublish() {
        const text = document.getElementById('post-text').value;
        if(!text.trim()) return;

        const newPost = {
            id: Date.now(),
            userId: appState.user.id,
            author: appState.user.name,
            avatar: appState.user.avatar,
            content: text,
            timestamp: "الآن",
            likes: 0,
            reactions: "👍",
            comments: []
        };

        appState.posts.unshift(newPost);
        syncStorage();
        document.getElementById('post-text').value = "";
        renderFeed();
    }

    // --- نظام التفاعل (Facebook Reactions) ---
    function showReactions(postId) {
        const box = document.getElementById(`react-box-${postId}`);
        box.style.display = (box.style.display === 'flex') ? 'none' : 'flex';
    }

    function applyReaction(postId, emoji) {
        const post = appState.posts.find(p => p.id === postId);
        post.reactions = emoji;
        document.getElementById(`like-sound`).play();
        syncStorage();
        renderFeed();
    }

    // --- عرض المحتوى (Rendering) ---
    function renderFeed() {
        const container = document.getElementById('feed-render');
        container.innerHTML = appState.posts.map(post => `
            <div class="card">
                <div class="post-header">
                    <img src="${post.avatar}" class="avatar-sm">
                    <div class="user-info">
                        <b>${post.author}</b>
                        <small>${post.timestamp}</small>
                    </div>
                </div>
                <div class="post-content">${post.content}</div>
                <div class="post-stats">
                    <div class="stat-item"><i class="fas fa-heart" style="color: #e0245e;"></i> ${post.likes} تفاعلات</div>
                    <div class="stat-item">${post.comments.length} تعليقات</div>
                </div>
                <div class="post-actions">
                    <div class="action-btn" oncontextmenu="event.preventDefault(); showReactions(${post.id})" onclick="applyReaction(${post.id}, '👍')">
                        <div class="reactions-box" id="react-box-${post.id}">
                            <span onclick="applyReaction(${post.id}, '❤️')">❤️</span>
                            <span onclick="applyReaction(${post.id}, '😂')">😂</span>
                            <span onclick="applyReaction(${post.id}, '😮')">😮</span>
                            <span onclick="applyReaction(${post.id}, '😡')">😡</span>
                        </div>
                        <span style="font-size: 20px;">${post.reactions}</span> إعجاب
                    </div>
                    <div class="action-btn"><i class="far fa-comment"></i> تعليق</div>
                    <div class="action-btn"><i class="far fa-share-square"></i> مشاركة</div>
                </div>
            </div>
        `).join('');
    }

    // --- خدمات إضافية ---
    function navigate(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        el.classList.add('active');
    }

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    
    function syncStorage() {
        localStorage.setItem('posts', JSON.stringify(appState.posts));
        localStorage.setItem('user', JSON.stringify(appState.user));
    }

    init();
</script>
</body>
</html>
