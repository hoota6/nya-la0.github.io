<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبكة البحير | Albeher Net</title>
    <style>
        :root { --main: #ff2d55; --dark: #4e085f; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; overflow-x: hidden; }
        
        /* شاشة الدخول والتسجيل */
        #auth-screen { position: fixed; inset: 0; background: linear-gradient(135deg, var(--main), var(--dark)); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .auth-box { background: white; padding: 25px; border-radius: 20px; width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-main { background: var(--main); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-second { background: var(--dark); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* الهيكل الداخلي للموقع (الصفحات) */
        #main-app { display: none; } /* مخفي حتى يتم الدخول */
        .navbar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #ddd; }
        .nav-item { cursor: pointer; color: #666; font-size: 0.9rem; text-align: center; }
        .active { color: var(--main); font-weight: bold; }
        
        .header { background: var(--main); color: white; padding: 15px; text-align: center; position: fixed; top: 0; width: 100%; font-weight: bold; }
        .content { padding: 70px 20px; }
        .page { display: none; }
        .show { display: block; }
        
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box" id="reg-box">
            <h2 style="color: var(--main);">تسجيل جديد</h2>
            <input type="text" id="r-name" placeholder="اسم المستخدم">
            <input type="password" id="r-pass" placeholder="كلمة السر">
            <select id="r-state"><option>الخرطوم</option><option>نيالا</option><option>بورتسودان</option></select>
            <button class="btn-main" onclick="register()">إنشاء الحساب</button>
            <hr>
            <button class="btn-second" onclick="showLogin()">لدي حساب بالفعل</button>
        </div>

        <div class="auth-box" id="log-box" style="display: none;">
            <h2 style="color: var(--dark);">دخول للموقع</h2>
            <input type="text" id="l-name" placeholder="اسم المستخدم">
            <input type="password" id="l-pass" placeholder="كلمة السر">
            <button class="btn-main" style="background: var(--dark);" onclick="login()">دخول الآن</button>
            <p onclick="showReg()" style="cursor:pointer; color: var(--main); margin-top:10px; font-size:0.8rem;">إنشاء حساب جديد</p>
        </div>
    </div>

    <div id="main-app">
        <div class="header" id="title">استكشف</div>
        
        <div class="content">
            <div id="p1" class="page show">
                <div class="card"><b>أحمد محمد</b> - الخرطوم <br> <button style="margin-top:5px;">مراسلة</button></div>
                <div class="card"><b>سارة علي</b> - بورتسودان <br> <button style="margin-top:5px;">مراسلة</button></div>
            </div>
            <div id="p2" class="page"><h3>لا توجد رسائل جديدة</h3></div>
            <div id="p3" class="page"><h3>إشعار: رحب بالأعضاء الجدد!</h3></div>
        </div>

        <div class="navbar">
            <div class="nav-item active" onclick="nav(1, 'استكشف')">🏠 استكشف</div>
            <div class="nav-item" onclick="nav(2, 'الرسائل')">💬 الرسائل</div>
            <div class="nav-item" onclick="nav(3, 'الإشعارات')">🔔 الإشعارات</div>
            <div class="nav-item" onclick="location.reload()">🚪 خروج</div>
        </div>
    </div>

    <script>
        // التبديل بين الشاشات
        function showLogin() { document.getElementById('reg-box').style.display='none'; document.getElementById('log-box').style.display='block'; }
        function showReg() { document.getElementById('log-box').style.display='none'; document.getElementById('reg-box').style.display='block'; }

        // وظيفة التسجيل
        function register() {
            const name = document.getElementById('r-name').value;
            const pass = document.getElementById('r-pass').value;
            if(name && pass) {
                localStorage.setItem(name, pass); // حفظ مؤقت للتجربة
                alert("تم التسجيل بنجاح! ادخل الآن.");
                showLogin();
            } else { alert("اكمل البيانات"); }
        }

        // وظيفة الدخول وعرض الصفحات
        function login() {
            const name = document.getElementById('l-name').value;
            const pass = document.getElementById('l-pass').value;
            const savedPass = localStorage.getItem(name);

            if(savedPass && savedPass === pass) {
                document.getElementById('auth-screen').style.display = 'none'; // إخفاء شاشة الدخول
                document.getElementById('main-app').style.display = 'block';   // عرض صفحات الموقع
            } else {
                alert("الاسم أو كلمة السر غير صحيحة!");
            }
        }

        // التنقل بين الصفحات
        function nav(pNum, title) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
            document.getElementById('p' + pNum).classList.add('show');
            document.getElementById('title').innerText = title;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
