<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبكة تواصل البحير | ملف شخصي كامل</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <style>
        :root { --main: #0055d4; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        /* شاشة الدخول والتسجيل */
        #login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--main); }
        .auth-box { background: white; padding: 25px; border-radius: 15px; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        input, select, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        button { background: var(--main); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }

        /* الواجهة الرئيسية */
        #main-app { display: none; }
        .nav { background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: fixed; width: 100%; top: 0; z-index: 100; box-sizing: border-box;}
        
        .container { max-width: 600px; margin: 80px auto 20px auto; padding: 0 15px; }
        
        /* كرت المستخدم */
        .user-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .user-info-flex { display: flex; align-items: center; }
        .user-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; background: #eee; border: 2px solid var(--main); }
        .user-details { margin-right: 15px; flex: 1; }
        .user-details b { font-size: 1.1rem; }
        .status-tag { font-size: 0.75rem; color: #666; background: #eee; padding: 2px 8px; border-radius: 10px; }

        /* نافذة الدردشة */
        #chat-window { display: none; position: fixed; inset: 0; background: white; z-index: 200; flex-direction: column; }
        .chat-header { padding: 15px; background: var(--main); color: white; display: flex; align-items: center; justify-content: space-between; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; background: #f9f9f9; }
        .msg { padding: 10px 15px; border-radius: 15px; margin-bottom: 8px; max-width: 75%; }
        .msg.sent { background: var(--main); color: white; align-self: flex-start; }
        .msg.received { background: #e4e6eb; align-self: flex-end; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="auth-box">
            <h2 style="text-align:center; color: var(--main);">إنشاء حساب جديد</h2>
            <input type="text" id="username" placeholder="اسم المستخدم">
            <input type="password" id="password" placeholder="كلمة السر">
            <input type="text" id="hobby" placeholder="هوايتك (مثلاً: البرمجة، السفر)">
            <select id="social-status">
                <option value="أعزب">أعزب</option>
                <option value="متزوج">متزوج</option>
                <option value="خاطب">خاطب</option>
            </select>
            <p style="font-size: 0.8rem; margin: 5px 0;">رابط صورة البروفايل (اختياري):</p>
            <input type="text" id="photoURL" placeholder="https://example.com/image.jpg">
            <button onclick="registerAndLogin()">تسجيل والدخول</button>
        </div>
    </div>

    <div id="main-app">
        <div class="nav">
            <b style="color: var(--main);">شبكة البحير نت</b>
            <span onclick="location.reload()" style="cursor:pointer; color:red; font-weight:bold;">خروج</span>
        </div>

        <div class="container" id="users-list">
            <p style="text-align: center;">جاري جلب المستخدمين...</p>
        </div>
    </div>

    <div id="chat-window">
        <div class="chat-header">
            <button onclick="closeChat()" style="width:auto; background:none; font-size:20px;">➡️</button>
            <span id="chat-with-name">الدردشة</span>
            <div></div>
        </div>
        <div id="messages"></div>
        <div style="padding:15px; display:flex; border-top:1px solid #ddd;">
            <input type="text" id="msgText" placeholder="اكتب رسالة..." style="margin:0; border-radius: 20px;">
            <button onclick="sendMessage()" style="width:80px; margin-right:5px; border-radius:20px;">إرسال</button>
        </div>
    </div>

    <script>
        // --- إعدادات Firebase ---
        const firebaseConfig = {
            apiKey: "ضع_هنا_API_KEY",
            authDomain: "مشروعك.firebaseapp.com",
            databaseURL: "https://مشروعك.firebaseio.com",
            projectId: "مشروعك",
            storageBucket: "مشروعك.appspot.com",
            messagingSenderId: "12345678",
            appId: "1:12345678:web:abc123"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myUser = "";
        let chatTarget = "";

        function registerAndLogin() {
            const user = document.getElementById('username').value.trim();
            const hobby = document.getElementById('hobby').value.trim();
            const status = document.getElementById('social-status').value;
            const photo = document.getElementById('photoURL').value.trim() || "https://cdn-icons-png.flaticon.com/512/149/149071.png";

            if (!user) return alert("ادخل اسم المستخدم");

            myUser = user;
            
            // حفظ بيانات المستخدم مع التوقيت
            const userData = {
                username: myUser,
                hobby: hobby,
                socialStatus: status,
                photo: photo,
                lastSeen: "نشط الآن"
            };

            db.ref('users/' + myUser).set(userData);
            
            // تحديث آخر ظهور عند إغلاق المتصفح
            db.ref('users/' + myUser + '/lastSeen').onDisconnect().set(new Date().toLocaleString('ar-EG'));

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            loadUsers();
        }

        function loadUsers() {
            db.ref('users').on('value', snapshot => {
                const list = document.getElementById('users-list');
                list.innerHTML = "";
                snapshot.forEach(child => {
                    const u = child.val();
                    if (u.username !== myUser) {
                        list.innerHTML += `
                            <div class="user-card">
                                <div class="user-info-flex">
                                    <img src="${u.photo}" class="user-img">
                                    <div class="user-details">
                                        <b>${u.username}</b> <span class="status-tag">${u.socialStatus}</span><br>
                                        <small>الهواية: ${u.hobby || 'غير محددة'}</small><br>
                                        <small style="color:green">آخر ظهور: ${u.lastSeen}</small>
                                    </div>
                                    <button onclick="openChat('${u.username}')" style="width:auto; padding:5px 15px;">دردشة</button>
                                </div>
                            </div>
                        `;
                    }
                });
            });
        }

        // --- وظائف الدردشة (نفس المنطق السابق) ---
        function openChat(name) {
            chatTarget = name;
            document.getElementById('chat-with-name').innerText = name;
            document.getElementById('chat-window').style.display = 'flex';
            loadMessages();
        }
        function closeChat() { document.getElementById('chat-window').style.display = 'none'; }

        function sendMessage() {
            const txt = document.getElementById('msgText').value.trim();
            if (!txt) return;
            const chatId = [myUser, chatTarget].sort().join('_');
            db.ref('chats/' + chatId).push({ sender: myUser, text: txt, time: Date.now() });
            document.getElementById('msgText').value = "";
        }

        function loadMessages() {
            const chatId = [myUser, chatTarget].sort().join('_');
            db.ref('chats/' + chatId).on('value', snap => {
                const box = document.getElementById('messages');
                box.innerHTML = "";
                snap.forEach(msgSnap => {
                    const m = msgSnap.val();
                    const cls = m.sender === myUser ? 'sent' : 'received';
                    box.innerHTML += `<div class="msg ${cls}">${m.text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
